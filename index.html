      --bg-base: #060912;
      --glass: rgba(15, 23, 41, .64);
      --glass-strong: rgba(12, 18, 33, .86);
      --line: rgba(255, 255, 255, .09);
      --line-2: rgba(255, 255, 255, .15);
      --txt: #f4f7fb;
      --txt-2: #b6c0d4;
      --txt-3: #7f8ba3;
      --accent: #38bdf8;
      --accent-2: #2563eb;
      --ok: #34d399;
      --danger: #fb7185;
      --radius: 28px;
      --shadow: 0 28px 90px rgba(0, 0, 0, .48);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--bg-base);
      color: var(--txt);
      font-family: "IBM Plex Sans Arabic", "Segoe UI", Tahoma, Arial, sans-serif;
    }

    .shell {
      position: fixed;
      inset: 0;
      background: var(--bg-base);
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: var(--bg-base);
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
      background:
        radial-gradient(900px 600px at 70% 10%, rgba(56,189,248,.13), transparent 60%),
        radial-gradient(760px 520px at 18% 85%, rgba(37,99,235,.16), transparent 66%),
        linear-gradient(180deg, rgba(6,9,18,.72), rgba(6,9,18,.94)),
        var(--bg-cosmic);
      background-size: cover;
      background-position: center;
      transition: opacity 260ms ease, visibility 260ms ease;
    }

    .loading::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: .05;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(circle at center, black 0, transparent 72%);
    }

    .loading::after {
      content: "";
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 999px;
      inset-inline-start: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(56,189,248,.18), transparent 67%);
      filter: blur(18px);
      opacity: .72;
      pointer-events: none;
    }

    .loading.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-card {
      position: relative;
      z-index: 2;
      width: min(520px, calc(100vw - 32px));
      padding: 34px 34px 30px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.018)),
        var(--glass);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      text-align: center;
      isolation: isolate;
    }

    .loading-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 2px;
      border-radius: inherit;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent-2), transparent);
      opacity: .86;
    }

    .logo-frame {
      width: 122px;
      min-height: 56px;
      margin: 0 auto 20px;
      display: grid;
      place-items: center;
      padding: 10px 16px;
      border: 1px solid rgba(56,189,248,.30);
      border-radius: 20px;
      background:
        radial-gradient(circle at 50% 0%, rgba(56,189,248,.20), transparent 70%),
        rgba(255,255,255,.045);
      box-shadow: 0 0 28px rgba(56,189,248,.16);
    }

    .brand-logo {
      display: block;
      width: 92px;
      max-width: 100%;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 12px rgba(56,189,248,.16));
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 6px 12px;
      border: 1px solid rgba(56,189,248,.22);
      border-radius: 999px;
      color: var(--accent);
      background: rgba(56,189,248,.08);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .03em;
    }

    .eyebrow-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--ok);
      box-shadow: 0 0 12px rgba(52,211,153,.85);
    }

    h1 {
      margin: 0;
      color: var(--txt);
      font-size: clamp(23px, 4vw, 31px);
      line-height: 1.35;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    p {
      margin: 10px auto 0;
      max-width: 390px;
      color: var(--txt-2);
      line-height: 1.9;
      font-size: 14px;
    }

    .progress-number {
      margin-top: 8px;
      font-size: clamp(30px, 6vw, 46px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -.04em;
      color: var(--txt);
      text-shadow: 0 0 22px rgba(56, 189, 248, .18);
    }

    .bar {
      overflow: hidden;
      position: relative;
      height: 7px;
      margin-top: 24px;
      border-radius: 999px;
      background: rgba(148, 163, 184, .16);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }

    .bar-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--progress, 1%);
      min-width: 1%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 22px rgba(56, 189, 248, .32);
      transition: width 220ms ease;
    }


    @media (max-width: 560px) {
      .loading-card { padding: 28px 22px 24px; border-radius: 24px; }
      .logo-frame { width: 112px; margin-bottom: 18px; }
      .brand-logo { width: 86px; }
      p { font-size: 13px; }
    }
  </style>

    (function () {

      function renderProgress(value) {
        progress = Math.max(1, Math.min(100, Math.round(value)));
        progressNumber.textContent = progress + '%';
        progressFill.style.setProperty('--progress', progress + '%');
      }

      function startProgress() {
        renderProgress(1);
        progressTimer = window.setInterval(function () {
          if (loaderClosed) return;

          var nextStep = progress < 55 ? 3 : progress < 82 ? 2 : 1;
          var cap = 96;

          if (progress < cap) {
            renderProgress(Math.min(cap, progress + nextStep));
          }
        }, 120);
      }

      function hideLoader() {
        if (loaderClosed) return;
        loaderClosed = true;
        window.clearInterval(progressTimer);
        renderProgress(100);

        window.setTimeout(function () {
          loader.classList.add('is-hidden');
        }, 420);
      }

      frame.addEventListener('load', hideLoader);
      startProgress();
    })();
  </script>
</body>
</html>
